# terminal opacity and blur
background_opacity 1.0
background_blur 1

# advance 
term xterm-kitty

# terminal bell
enable_audio_bell no

# font
font_family        SauceCodePro Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 12.0

# cursor customization
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

# scrollback
scrollback_lines 5000
wheel_scroll_multiplier 3.0

# mouse
mouse_hide_wait -1

# window layout
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 1.5pt
enabled_layouts splits, tall
window_padding_width 2
window_margin_width 2
hide_window_decorations no

# window management 
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# layout management
map ctrl+alt+t goto_layout tall
map ctrl+alt+s goto_layout stack


# --- Terminator-style Splits ---
# Split Side-by-Side (Vertical split)
map ctrl+shift+e launch --location=vsplit --cwd=current

# Split Top-and-Bottom (Horizontal split)
map ctrl+shift+o launch --location=hsplit --cwd=current

# --- Vim Motion Navigation ---
# Move focus to the window in the specified direction
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# --- Vim Motion Window Moving ---
# Physically move the window position in the stack
map ctrl+alt+h move_window left
map ctrl+alt+j move_window down
map ctrl+alt+k move_window up
map ctrl+alt+l move_window right

# tab bar customization
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# tab management
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab


# BEGIN_KITTY_THEME
# 3024 Day
include current-theme.conf
# END_KITTY_THEME
#
# [OSWALD] macOS option key - Gemini
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
